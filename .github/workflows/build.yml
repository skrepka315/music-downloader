name: Build Geode Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 1. Используем официальный установщик SDK
      - name: Setup Geode SDK
        uses: geode-sdk/setup-geode@v3
        with:
          # Можно указать конкретную версию SDK, если нужно
          # sdk: v3.0.0 

      # 2. Устанавливаем бинарные файлы для линковки (loader)
      - name: Install Binaries
        run: geode sdk install-binaries

      - name: Configure
        shell: pwsh
        run: |
          # Удаление build папки обычно не нужно на свежем Runner'е
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        shell: pwsh
        run: cmake --build build --config RelWithDebInfo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-downloader
          path: |
            build/**/*.geode
            **/*.geode
