name: Build Geode Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        # Для модов Geode лучше использовать x86 (32-bit), так как игра 32-битная
        with:
          arch: x86

      - name: Install Geode CLI
        run: |
          curl -L https://github.com/geode-sdk/cli/releases/download/v3.7.4/geode-cli-v3.7.4-win.zip -o cli.zip
          7z x cli.zip -ocli
          echo "${{ github.workspace }}/cli" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Geode SDK
        run: |
          # 1. Устанавливаем сам SDK в нужную папку
          geode sdk install "${{ runner.temp }}/geode-sdk"
          
          # 2. Создаем профиль 'default' вручную, указывая путь к SDK
          # Это заменяет интерактивный 'geode config setup'
          geode profile add default "${{ runner.temp }}/geode-sdk"
          geode profile set-default default
          
          # 3. Скачиваем бинарники
          geode sdk install-binaries
        env:
          GEODE_SDK: ${{ runner.temp }}/geode-sdk

      - name: Configure
        # Добавил -DBUILD_GEODE_LOADER=OFF, чтобы не пересобирать лоадер, если не нужно
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
        env:
          GEODE_SDK: ${{ runner.temp }}/geode-sdk

      - name: Build
        run: cmake --build build --config RelWithDebInfo

      - name: Package
        # После сборки через CMake .geode файл обычно уже лежит в папке build
        run: geode package build build --platform win
        env:
          GEODE_SDK: ${{ runner.temp }}/geode-sdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-downloader
          path: build/*.geode
