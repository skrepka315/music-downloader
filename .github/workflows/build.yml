name: Build Geode Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: 'v5.4.1'
          target: 'Win64'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-downloader
          path: '*.geode'
